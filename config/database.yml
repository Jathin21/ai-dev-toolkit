default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: ai_dev_toolkit_development

test:
  <<: *default
  database: ai_dev_toolkit_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "ai_dev_toolkit_production") %>
  url: <%= ENV["DATABASE_URL"] %>
